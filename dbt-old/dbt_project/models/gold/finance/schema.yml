version: 2

models:

  - name: dm_finance_daily_city
    description: >
      KPI keuangan harian per kota: gross, net, payout driver,
      estimated platform revenue, dan take rate.
      Grain: 1 tanggal × 1 kota.
    columns:
      - name: date_key
        tests: [not_null, ride_hailing.date_key_format]
      - name: city
        tests: [not_null]
      - name: total_gross_amount
        tests: [ride_hailing.not_negative]
      - name: total_net_amount
        tests: [ride_hailing.not_negative]
      - name: total_driver_payout
        tests: [ride_hailing.not_negative]
      - name: estimated_platform_revenue
        description: Net amount dikurangi total payout driver.
      - name: platform_take_rate
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0.0
              max_value: 1.0

  - name: dm_payment_method_daily
    description: >
      Distribusi pembayaran per metode per hari.
      Grain: 1 tanggal × 1 metode pembayaran.
    columns:
      - name: date_key
        tests: [not_null, ride_hailing.date_key_format]
      - name: payment_method_name
        tests: [not_null]
      - name: payment_count
        tests: [not_null, ride_hailing.not_negative]
      - name: success_rate
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0.0
              max_value: 1.0
