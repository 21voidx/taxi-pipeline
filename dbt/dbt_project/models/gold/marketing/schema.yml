version: 2

models:

  - name: dm_promo_daily
    description: >
      Efektivitas dan pemakaian promo per hari per kode promo.
      Grain: 1 tanggal × 1 promo_code.
    columns:
      - name: date_key
        tests: [not_null, ride_hailing.date_key_format]
      - name: promo_code
        tests: [not_null]
      - name: total_redemption
        tests: [not_null, ride_hailing.not_negative]
      - name: total_discount_amount
        tests: [ride_hailing.not_negative]
      - name: unique_customer_count
        tests: [ride_hailing.not_negative]
      - name: redemption_to_completion_rate
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0.0
              max_value: 1.0

  - name: dm_campaign_daily_channel
    description: >
      Performa kampanye marketing per channel per hari:
      spend, impressi, klik, install, CPM, CPC, CPI, CTR.
      Grain: 1 tanggal × 1 channel × 1 campaign.
    columns:
      - name: date_key
        tests: [not_null, ride_hailing.date_key_format]
      - name: channel_name
        tests: [not_null]
      - name: campaign_name
        tests: [not_null]
      - name: spend_amount
        tests: [not_null, ride_hailing.not_negative]
      - name: impressions
        tests: [not_null, ride_hailing.not_negative]
      - name: clicks
        tests: [ride_hailing.not_negative]
      - name: installs
        tests: [ride_hailing.not_negative]
      - name: ctr
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0.0
              max_value: 1.0

  - name: dm_customer_segment_daily
    description: >
      Distribusi dan statistik skor segmen customer per hari.
      Grain: 1 snapshot_date × 1 segment_name.
    columns:
      - name: snapshot_date
        tests: [not_null]
      - name: segment_name
        tests:
          - not_null
          - accepted_values:
              values: [platinum, gold, silver, bronze, new]
      - name: customer_count
        tests: [not_null, ride_hailing.not_negative]
      - name: avg_segment_score
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0.0
              max_value: 100.0
