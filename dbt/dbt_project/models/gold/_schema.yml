version: 2

models:
  - name: dim_date
    description: "Dimensi tanggal — spine dari data_start_date hingga +1 tahun, termasuk hari libur nasional Indonesia."
    columns:
      - name: date_key
        tests: [unique, not_null]
      - name: full_date
        tests: [unique, not_null]

  - name: dim_driver
    description: "Dimensi pengemudi SCD Type 2 — membaca dari snapshot snp_drivers."
    columns:
      - name: driver_sk
        tests: [unique, not_null]
      - name: driver_id
        tests: [not_null]
      - name: driver_tier
        tests:
          - accepted_values:
              values: ['BRONZE','SILVER','GOLD','PLATINUM']

  - name: dim_passenger
    description: "Dimensi penumpang SCD Type 2 — membaca dari snapshot snp_passengers."
    columns:
      - name: passenger_sk
        tests: [unique, not_null]
      - name: passenger_id
        tests: [not_null]

  - name: dim_zone
    description: "Dimensi zona Jabodetabek (10 zona, SCD-1 / static)."
    columns:
      - name: zone_sk
        tests: [unique, not_null]
      - name: zone_id
        tests: [unique, not_null]

  - name: dim_vehicle_type
    description: "Dimensi jenis kendaraan dan konfigurasi tarif (static)."
    columns:
      - name: vehicle_type_sk
        tests: [unique, not_null]

  - name: dim_payment_method
    description: "Dimensi channel pembayaran aktif (static)."
    columns:
      - name: payment_method_sk
        tests: [unique, not_null]

  - name: fact_rides
    description: >
      Fact table utama — satu baris per ride.
      Star schema: fact_rides → dim_date, dim_driver, dim_passenger,
      dim_zone (pickup + dropoff), dim_vehicle_type, dim_payment_method.
    columns:
      - name: ride_sk
        tests: [unique, not_null]
      - name: ride_id
        tests: [unique, not_null]
      - name: gmv
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 2000000
      - name: driver_earning
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1600000

  - name: fact_payments
    description: "Fact pembayaran — satu baris per transaksi, sumber refund metrics di mart."
    columns:
      - name: payment_sk
        tests: [unique, not_null]
      - name: payment_id
        tests: [unique, not_null]

  - name: fact_driver_daily_perf
    description: >
      Fact performa pengemudi harian — grain: driver_id × date.
      Digunakan untuk driver scorecard, eligibilitas insentif,
      analisis supply.
    columns:
      - name: driver_daily_sk
        tests: [unique, not_null]
      - name: completion_rate_pct
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

  - name: fact_zone_demand
    description: >
      Fact permintaan per zona — grain: zona × tanggal × jam × vehicle_type.
      Digunakan untuk heatmap, simulasi surge, analisis alokasi supply.
    columns:
      - name: zone_demand_sk
        tests: [unique, not_null]

  - name: mart_executive_summary
    description: >
      Mart eksekutif — grain: satu baris per hari kalender.
      Sumber tunggal KPI untuk C-level dashboard: GMV, completion rate,
      rolling 7d avg, day-over-day pct, cumulative metrics.
    columns:
      - name: ride_date
        tests: [unique, not_null]
      - name: gmv
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 9999999999
      - name: completion_rate_pct
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
