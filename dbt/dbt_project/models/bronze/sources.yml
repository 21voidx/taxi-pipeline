version: 2

# ============================================================
# Bronze Sources
# Raw tables hasil load Airflow dari PostgreSQL & MySQL
# ============================================================

sources:

  # ──────────────────────────────────────────────────────────
  # PostgreSQL  →  BigQuery bronze_pg
  # ──────────────────────────────────────────────────────────
  - name: bronze_pg
    description: >
      Raw data operasional ride-hailing yang di-load dari PostgreSQL (ride_ops_pg)
      ke BigQuery oleh Airflow. Setiap tabel mencerminkan 1:1 tabel source
      dengan tambahan kolom _ingested_at dan _source_system.
    database: "{{ var('gcp_project') }}"
    schema:   "{{ var('bronze_pg_dataset') }}"
    loader:   airflow

    freshness:
      warn_after:  {count: 2,  period: hour}
      error_after: {count: 6,  period: hour}
    loaded_at_field: _ingested_at

    tables:

      - name: customers_raw
        description: Data master customer dari PostgreSQL.
        columns:
          - name: customer_id
            description: Primary key dari source.
            tests: [unique, not_null]
          - name: full_name
            tests: [not_null]
          - name: gender
            tests:
              - accepted_values:
                  values: ["male", "female", "other"]
          - name: created_at
            tests: [not_null]
          - name: _ingested_at
            tests: [not_null]

      - name: drivers_raw
        description: Data master driver dari PostgreSQL.
        columns:
          - name: driver_id
            tests: [unique, not_null]
          - name: driver_status
            tests:
              - accepted_values:
                  values: ["active", "inactive", "suspended"]
          - name: created_at
            tests: [not_null]

      - name: vehicles_raw
        description: Data kendaraan milik driver.
        columns:
          - name: vehicle_id
            tests: [unique, not_null]
          - name: driver_id
            tests: [not_null]
          - name: vehicle_type
            tests:
              - accepted_values:
                  values: ["economy", "standard", "premium", "motor"]

      - name: trips_raw
        description: Transaksi trip ride-hailing.
        freshness:
          warn_after:  {count: 1,  period: hour}
          error_after: {count: 3,  period: hour}
        columns:
          - name: trip_id
            tests: [unique, not_null]
          - name: customer_id
            tests: [not_null]
          - name: driver_id
            tests: [not_null]
          - name: vehicle_id
            tests: [not_null]
          - name: trip_status
            tests:
              - accepted_values:
                  values: ["completed", "cancelled", "no_show"]
          - name: request_ts
            tests: [not_null]
          - name: created_at
            tests: [not_null]

      - name: trip_status_logs_raw
        description: Log perubahan status per trip.
        columns:
          - name: trip_status_log_id
            tests: [unique, not_null]
          - name: trip_id
            tests: [not_null]
          - name: status_code
            tests:
              - accepted_values:
                  values:
                    - requested
                    - driver_accepted
                    - driver_arrived
                    - trip_started
                    - trip_completed
                    - trip_cancelled
          - name: actor_type
            tests:
              - accepted_values:
                  values: ["system", "driver", "customer"]

      - name: payments_raw
        description: Transaksi pembayaran per trip.
        columns:
          - name: payment_id
            tests: [unique, not_null]
          - name: trip_id
            tests: [not_null]
          - name: payment_status
            tests:
              - accepted_values:
                  values: ["success", "failed", "pending", "refunded"]
          - name: gross_amount
            tests:
              - not_null
              - ride_hailing.not_negative
          - name: net_amount
            tests:
              - not_null
              - ride_hailing.not_negative

      - name: driver_payouts_raw
        description: Payout ke driver per trip.
        columns:
          - name: payout_id
            tests: [unique, not_null]
          - name: driver_id
            tests: [not_null]
          - name: trip_id
            tests: [not_null]
          - name: payout_status
            tests:
              - accepted_values:
                  values: ["paid", "pending", "failed"]
          - name: final_payout_amount
            tests:
              - not_null
              - ride_hailing.not_negative

      - name: ratings_raw
        description: Rating yang diberikan customer setelah trip.
        columns:
          - name: rating_id
            tests: [unique, not_null]
          - name: trip_id
            tests: [not_null]
          - name: rating_score
            tests:
              - not_null
              - ride_hailing.rating_score_range

  # ──────────────────────────────────────────────────────────
  # MySQL  →  BigQuery bronze_mysql
  # ──────────────────────────────────────────────────────────
  - name: bronze_mysql
    description: >
      Raw data marketing & CRM yang di-load dari MySQL (ride_marketing_mysql)
      ke BigQuery oleh Airflow.
    database: "{{ var('gcp_project') }}"
    schema:   "{{ var('bronze_mysql_dataset') }}"
    loader:   airflow

    freshness:
      warn_after:  {count: 4,  period: hour}
      error_after: {count: 12, period: hour}
    loaded_at_field: _ingested_at

    tables:

      - name: promotions_raw
        description: Master data promo / kampanye diskon.
        columns:
          - name: promo_id
            tests: [unique, not_null]
          - name: promo_code
            tests: [unique, not_null]
          - name: discount_type
            tests:
              - accepted_values:
                  values: ["percentage", "fixed"]
          - name: promo_status
            tests:
              - accepted_values:
                  values: ["active", "expired", "paused", "draft"]

      - name: promo_redemptions_raw
        description: Pemakaian promo oleh customer per trip.
        columns:
          - name: redemption_id
            tests: [unique, not_null]
          - name: promo_id
            tests: [not_null]
          - name: customer_id
            tests: [not_null]
          - name: trip_id
            tests: [not_null]
          - name: redemption_status
            tests:
              - accepted_values:
                  values: ["success", "failed", "reversed"]
          - name: discount_amount
            tests:
              - not_null
              - ride_hailing.not_negative

      - name: customer_segments_raw
        description: Snapshot harian segmentasi customer oleh sistem CRM.
        columns:
          - name: customer_id
            tests: [not_null]
          - name: segment_name
            tests:
              - not_null
              - accepted_values:
                  values: ["platinum", "gold", "silver", "bronze", "new"]
          - name: snapshot_date
            tests: [not_null]

      - name: campaign_spend_raw
        description: Pengeluaran harian kampanye pemasaran per channel.
        columns:
          - name: campaign_id
            tests: [unique, not_null]
          - name: spend_amount
            tests:
              - not_null
              - ride_hailing.not_negative
          - name: spend_date
            tests: [not_null]
