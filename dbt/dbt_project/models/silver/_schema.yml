version: 2

models:
  - name: slv_drivers
    description: >
      Silver: profil pengemudi — regex-cleaned (phone, NIK, license_plate),
      diperkaya dengan zone & vehicle_type, ditambah driver_tier.
    columns:
      - name: driver_id
        tests: [unique, not_null]
      - name: phone_normalised
        tests:
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: '^08[0-9]{8,12}$'
              row_condition: "is_phone_valid = TRUE"
      - name: status
        tests:
          - accepted_values:
              values: ['ACTIVE','INACTIVE','SUSPENDED','PENDING']
      - name: driver_tier
        tests:
          - accepted_values:
              values: ['BRONZE','SILVER','GOLD','PLATINUM']

  - name: slv_passengers
    description: >
      Silver: profil penumpang — regex-cleaned (phone, email), diperkaya
      dengan zone, ditambah age_bucket dan loyalty_tier.
    columns:
      - name: passenger_id
        tests: [unique, not_null]
      - name: loyalty_tier
        tests:
          - accepted_values:
              values: ['BRONZE','SILVER','GOLD','PLATINUM']
      - name: gender
        tests:
          - accepted_values:
              values: ['M','F','OTHER','UNKNOWN']

  - name: slv_rides
    description: >
      Silver: central rides model — join semua dimensi (driver, passenger,
      zones, payment), derive KPIs (wait_time, speed, revenue_bucket).
    columns:
      - name: ride_id
        tests: [unique, not_null]
      - name: ride_status
        tests:
          - accepted_values:
              values: ['REQUESTED','ACCEPTED','PICKED_UP','COMPLETED','CANCELLED','NO_DRIVER']
      - name: total_fare
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 2000000
      - name: surge_multiplier
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1.0
              max_value: 5.0

  - name: slv_payments
    description: >
      Silver: transaksi pembayaran — JSON gateway_raw_response di-parse,
      gateway_ref di-validate via regex, diperkaya dengan payment_methods.
    columns:
      - name: payment_id
        tests: [unique, not_null]
      - name: payment_status
        tests:
          - accepted_values:
              values: ['PENDING','SUCCESS','FAILED','REFUNDED','EXPIRED']
      - name: amount
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 5000000
