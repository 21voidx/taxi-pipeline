version: 2

models:

  - name: dim_date
    description: Date spine from data_start_date to today + 90 days with Indonesian business calendar attributes.
    columns:
      - name: date_id
        tests: [unique, not_null]
      - name: full_date
        tests: [unique, not_null]

  - name: dim_zones
    description: Active geographic zones enriched with province and area type classification.
    columns:
      - name: zone_id
        tests: [unique, not_null]
      - name: zone_code
        tests: [unique, not_null]
      - name: area_type
        tests:
          - accepted_values:
              values: ["Jakarta Core", "Greater Jakarta"]

  - name: dim_drivers
    description: >
      Clean driver dimension with vehicle type and home zone denormalised.
      Source: stg_drivers → vehicle_types → dim_zones.
    columns:
      - name: driver_id
        tests: [unique, not_null]
      - name: experience_tier
        tests:
          - accepted_values:
              values: ["Bronze", "Silver", "Gold", "Platinum"]

  - name: dim_passengers
    description: Clean passenger dimension with loyalty tier and home zone denormalised.
    columns:
      - name: passenger_id
        tests: [unique, not_null]
      - name: loyalty_tier
        tests:
          - accepted_values:
              values: ["New", "Silver", "Gold", "Platinum"]

  - name: dim_vehicle_types
    description: Vehicle type dimension with fare tier and category groupings.
    columns:
      - name: vehicle_type_id
        tests: [unique, not_null]
      - name: fare_tier
        tests:
          - accepted_values:
              values: ["Economy", "Mid-Range", "Premium"]
