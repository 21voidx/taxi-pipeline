name: "ride_hailing"
version: "1.0.0"
config-version: 2

profile: "ride_hailing"

# ─────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────
model-paths:     ["models"]
macro-paths:     ["macros"]
seed-paths:      ["seeds"]
test-paths:      ["tests"]
snapshot-paths:  ["snapshots"]
analysis-paths:  ["analyses"]
docs-paths:      ["docs"]

target-path:     "target"
clean-targets:   ["target", "dbt_packages"]

# ─────────────────────────────────────────────────────────────
# Variables
# ─────────────────────────────────────────────────────────────
vars:
  # Ganti dengan GCP project ID
  gcp_project:        "dbt-taxi-explore"

  # Dataset sumber (Bronze layer – hasil load Airflow)
  bronze_pg_dataset:    "bronze_pg"
  bronze_mysql_dataset: "bronze_mysql"

  # Window incremental load (hari ke belakang untuk safety net late data)
  incremental_lookback_days: 3

  # Periode data bisnis
  data_start_date: "2026-01-01"

# ─────────────────────────────────────────────────────────────
# Model Config  (default + per-folder override)
# ─────────────────────────────────────────────────────────────
models:
  ride_hailing:
    +persist_docs:
      relation: true
      columns: true

    # ── BRONZE ────────────────────────────────────────────────────
    bronze:
      +materialized: incremental
      +schema: bronze
      +tags: ['bronze']

    # ── SILVER ────────────────────────────────────────────────────
    silver:
      +materialized: incremental
      +schema: silver
      +tags: ['silver']

    # ── GOLD ──────────────────────────────────────────────────────
    gold:
      +schema: gold
      +materialized: table
      +tags: ['gold']

# ─────────────────────────────────────────────────────────────
# Snapshots Config
# ─────────────────────────────────────────────────────────────
snapshots:
  ride_hailing:
    +target_schema: silver_snapshots
    +strategy: timestamp
    +updated_at: updated_at
    +invalidate_hard_deletes: true

# ─────────────────────────────────────────────────────────────
# Seeds Config
# ─────────────────────────────────────────────────────────────
seeds:
  ride_hailing:
    +schema: seeds

