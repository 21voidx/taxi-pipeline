version: 2

seeds:

  - name: national_holidays
    description: >
      Daftar hari libur nasional dan cuti bersama Indonesia tahun 2026.
      Dipakai untuk memperkaya dim_date dengan flag is_national_holiday.
    config:
      column_types:
        holiday_date:   date
        is_long_weekend: boolean
    columns:
      - name: holiday_date
        tests: [unique, not_null]
      - name: holiday_name
        tests: [not_null]
      - name: holiday_type
        tests:
          - accepted_values:
              values: [national, joint_leave]

  - name: city_master
    description: >
      Master referensi kota operasional ride-hailing.
      Berisi koordinat pusat, timezone, dan tier kota.
    columns:
      - name: city_name
        tests: [unique, not_null]
      - name: timezone
        tests:
          - accepted_values:
              values: [Asia/Jakarta, Asia/Makassar, Asia/Jayapura]
      - name: population_class
        tests:
          - accepted_values:
              values: [tier_1, tier_2, tier_3]

  - name: cancel_reason_lookup
    description: >
      Lookup teks alasan pembatalan trip beserta kategori,
      siapa yang menginisiasi, dan attributable to driver/customer.
    columns:
      - name: cancel_reason_text
        tests: [unique, not_null]
      - name: cancel_category
        tests: [not_null]
      - name: initiated_by
        tests:
          - accepted_values:
              values: [customer, driver, system]
