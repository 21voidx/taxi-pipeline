# ════════════════════════════════════════════════════════════
#  minio.properties
#  Dimount ke /opt/kafka/secrets/ di Kafka Connect container.
#  Kafka Connect membaca credentials via:
#    ${file:/opt/kafka/secrets/minio.properties:minio.access.key}
#
#  Gunakan credentials service account 'kafkaconnect' yang
#  dibuat oleh minio-init, atau root credentials untuk dev.
# ════════════════════════════════════════════════════════════

minio.access.key=kafkaconnect
minio.secret.key=kafkaconnect123
